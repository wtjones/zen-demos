name: Build Larse

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - lar-ci-dos
    paths:
      - 'larse/**'
      - '.github/workflows/build-larse.yml'

  pull_request:
    paths:
      - 'larse/**'
      - '.github/workflows/build-larse.yml'

permissions:
  contents: write

jobs:

  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: larse

    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build

      - name: Build tests
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --output-junit tests.xml

      - name: List files
        run: find . -name '*.xml'
      - name: List files
        run: find . -name '*.lsp'
      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "larse/build/**/tests*.xml"
        if: always()

  linux:
    runs-on: ubuntu-latest
    needs: tests

    defaults:
      run:
        working-directory: larse

    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build

      - name: Get version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep '^CMAKE_PROJECT_VERSION:STATIC=' build/CMakeCache.txt | cut -d= -f2)
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${BASE_VERSION}+${GITHUB_RUN_NUMBER}.${SHORT_SHA}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          tar -czf \
            "larse-${{ steps.version.outputs.version }}-linux.tar.gz" \
            -C build/bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: larse/larse-${{ steps.version.outputs.version }}-linux.tar.gz

  dos:
    runs-on: ubuntu-latest
    needs: tests

    defaults:
      run:
        working-directory: larse

    steps:
      - uses: actions/checkout@v5

      - name: Run build_docker_dos.sh
        run: |
          ./build_docker_dos.sh

      - name: Run build_dos.sh
        run: |
          ./build_dos.sh

      - name: Package
        run: |
          tar -czf \
            "larse-${{ steps.version.outputs.version }}-dos.tar.gz" \
            README.md -C bld_dos/bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dos
          path: larse/larse-${{ steps.version.outputs.version }}-dos.tar.gz

  release:
    runs-on: ubuntu-latest

    needs:
      - tests
      - linux
      - dos

    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts

      - name: Update CI Release
        uses: ncipollo/release-action@v1
        with:
          tag: larse-ci
          name: Larse Continuous Build
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: false
          artifacts: |
            artifacts/**/*.tar.gz
