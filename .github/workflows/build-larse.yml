name: Build Larse

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - lar-ci
    paths:
      - 'larse/**'
      - '.github/workflows/build-larse.yml'

  pull_request:
    paths:
      - 'larse/**'
      - '.github/workflows/build-larse.yml'

permissions:
  contents: write

jobs:
  posix:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: larse

    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build

      - name: Get version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep '^CMAKE_PROJECT_VERSION:STATIC=' build/CMakeCache.txt | cut -d= -f2)
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${BASE_VERSION}+${GITHUB_RUN_NUMBER}.${SHORT_SHA}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          tar -czf "larse-${{ steps.version.outputs.version }}-linux.tar.gz" -C build/bin .

      - name: Upload CI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: larse-${{ steps.version.outputs.version }}-linux
          path: larse/larse-${{ steps.version.outputs.version }}-linux.tar.gz

      - name: Update Continuous Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: ci
          name: Continuous Build
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: false
          body: |
            Latest successful build.

            Version: ${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}
          artifacts: larse/larse-${{ steps.version.outputs.version }}-linux.tar.gz
